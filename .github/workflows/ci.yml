name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: gofmt
        if: runner.os != 'Windows'
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "These files need gofmt:"; echo "$unformatted"; exit 1
          fi
      - name: go vet
        run: go vet ./...
      - name: build
        run: go build ./...
      - name: test (race)
        if: runner.os != 'Windows'
        run: go test -race ./...
      - name: test
        if: runner.os == 'Windows'
        run: go test ./...

  integration:
    name: integration (tmux + pty)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: install tmux
        run: sudo apt-get update && sudo apt-get install -y tmux
      - name: build linux binary
        run: go build -o sleeperagent-linux ./cmd/sleeperagent
      - name: run integration scripts
        run: |
          set -e
          for s in test/integration.sh \
                   test/integration_m2.sh \
                   test/integration_m2_autodetach.sh \
                   test/integration_attach.sh \
                   test/integration_codex.sh \
                   test/integration_reprompt.sh \
                   test/integration_pty.sh; do
            echo "=== $s ==="
            bash "$s"
          done
